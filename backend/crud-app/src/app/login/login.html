<div class="row justify-content-center mt-5">
  <div class="col-md-5">
    <div class="card shadow-sm">
      <div class="card-body">
        <h3 class="card-title mb-4">{{ mode === 'login' ? 'Log In' : 'Sign Up' }}</h3>

        <div *ngIf="error" class="alert alert-danger py-2">{{ error }}</div>

        <div class="mb-3">
          <label class="form-label">Username</label>
          <input class="form-control" [(ngModel)]="username" placeholder="username" />
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" class="form-control" [(ngModel)]="password" placeholder="password" />
        </div>

        <button class="btn btn-primary w-100" (click)="submit()" [disabled]="loading">
          {{ loading ? 'Please wait...' : (mode === 'login' ? 'Log In' : 'Sign Up') }}
        </button>

        <p class="text-center mt-3 mb-0">
          <a href="javascript:void(0)" (click)="toggle()">
            {{ mode === 'login' ? "No account? Sign up" : "Have an account? Log in" }}
          </a>
        </p>
      </div>
    </div>
  </div>
</div>
